<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Etos ID Palu - Portal App</title>
    
    <!-- Favicon Resmi Etos ID Palu -->
    <link rel="icon" href="https://lh3.googleusercontent.com/d/1x-5BQAUqRP7zHBmLWGYaB-Jsurdpn5XI" type="image/png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f7f6; /* Warna bg diselaraskan dengan index.html */
            font-family: 'Inter', sans-serif;
        }
        
        /* Membuat iframe benar-benar penuh tanpa batas */
        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 10;
        }

        .glass-overlay { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
        }
    </style>
</head>
<body>

    <!-- Preloader Minimalis (Hanya muncul saat loading awal, lalu hancur/hilang) -->
    <div id="wrapperLoader" class="absolute inset-0 z-50 glass-overlay flex items-center justify-center transition-opacity duration-500">
        <div class="flex flex-col items-center bg-white p-6 rounded-[24px] shadow-xl border border-slate-100">
            <i data-lucide="loader-2" class="w-8 h-8 text-[#155e3f] animate-spin mb-3"></i>
            <span class="text-xs font-bold text-slate-800 tracking-wide">Menghubungkan Portal...</span>
        </div>
    </div>

    <!-- Iframe Murni Full Screen 100% -->
    <iframe 
        id="portalIframe"
        src="https://script.google.com/macros/s/AKfycby2KnGRMyFCJxL-FaKy4v5z085Bmz1-S1RedUt2jdsX3pcyRsyTuYR1n7P1yjHM90U/exec" 
        class="fullscreen-iframe opacity-0 transition-opacity duration-300"
        allow="geolocation; microphone; camera; midi; encrypted-media; clipboard-write;"
        onload="onPortalLoaded()">
    </iframe>

    <script>
        // Inisialisasi Ikon Lucide untuk Loader
        try {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        } catch(e) {}

        const iframe = document.getElementById('portalIframe');
        const loader = document.getElementById('wrapperLoader');

        // Fungsi ketika link Google Apps Script selesai dimuat sepenuhnya
        function onPortalLoaded() {
            // Hilangkan loader
            loader.classList.add('opacity-0', 'pointer-events-none');
            // Munculkan iframe utama secara halus (fade-in)
            iframe.classList.remove('opacity-0');
            iframe.classList.add('opacity-100');
            
            // Hapus element loader dari DOM setelah transisi selesai untuk menghemat memori
            setTimeout(() => {
                loader.remove();
            }, 500);
        }
    </script>
</body>
</html>
