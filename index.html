<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#155e3f">
  <meta name="application-name" content="Dashboard Etos ID Palu">

  <title>Dashboard Etos ID Palu</title>

  <link rel="icon" type="image/png" sizes="32x32" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w32">
  <link rel="icon" type="image/png" sizes="128x128" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w128">
  <link rel="shortcut icon" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w128">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w180">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f4f7f6;
    }

    /*
     * Tidak memakai loading overlay, modal pembungkus, atau lapisan z-index.
     * Tujuannya agar tidak ada elemen transparan yang menutup iframe
     * dan menyerap klik saat dijalankan di Vercel.
     */
    #etos-app {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      background: #f4f7f6;
      pointer-events: auto;
      touch-action: auto;
    }
  </style>
</head>

<body>
  <iframe
    id="etos-app"
    name="etos-app"
    src="https://script.google.com/macros/s/AKfycby2KnGRMyFCJxL-FaKy4v5z085Bmz1-S1RedUt2jdsX3pcyRsyTuYR1n7P1yjHM90U/exec"
    title="Dashboard Etos ID Palu"
    frameborder="0"
    scrolling="yes"
    loading="eager"
    allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen"
    allowfullscreen
  ></iframe>
</body>
</html>
