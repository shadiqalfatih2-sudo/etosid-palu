<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#155e3f">
  <title>Dashboard Etos ID Palu</title>

  <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w128">
  <link rel="shortcut icon" type="image/png" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w128">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w256">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #f4f7f6;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f4f7f6;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7f6;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      min-width: 220px;
      padding: 28px 30px;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e5ebe8;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(21, 94, 63, 0.12);
    }

    .loader-logo {
      width: 70px;
      height: 70px;
      margin-bottom: 16px;
      object-fit: contain;
      border-radius: 16px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 14px;
      border: 4px solid #dce9e3;
      border-top-color: #155e3f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader-title {
      margin: 0;
      color: #17352a;
      font-size: 16px;
      font-weight: 700;
    }

    .loader-text {
      margin: 7px 0 0;
      color: #6b7c75;
      font-size: 12px;
    }

    #fallback {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #f4f7f6;
    }

    #fallback.show {
      display: flex;
    }

    .fallback-card {
      max-width: 440px;
      padding: 30px;
      text-align: center;
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(15, 45, 30, 0.12);
    }

    .fallback-card h2 {
      margin: 0 0 10px;
      color: #17352a;
      font-size: 21px;
    }

    .fallback-card p {
      margin: 0 0 20px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
    }

    .fallback-card a {
      display: inline-block;
      padding: 11px 20px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      background: #155e3f;
      border-radius: 999px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loader-card">
      <img
        class="loader-logo"
        src="https://drive.google.com/thumbnail?id=10YeZKGS5-CDLf_Ztrbn3te0Oa4ZfdOK0&sz=w256"
        alt="Logo Etos"
        onerror="this.style.display='none'"
      >
      <div class="spinner"></div>
      <p class="loader-title">Dashboard Etos ID Palu</p>
      <p class="loader-text">Memuat aplikasi...</p>
    </div>
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbyHwPN_qNbrSuxgUOBdFztE1B94UrUKg4SvybRvFKJBp_9RFWcbefbTczWF4-cXP2c/exec"
    title="Dashboard Etos ID Palu"
    allow="clipboard-read; clipboard-write; camera; microphone"
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>

  <div id="fallback">
    <div class="fallback-card">
      <h2>Aplikasi belum dapat dimuat</h2>
      <p>Silakan buka Dashboard Etos ID Palu langsung melalui tombol berikut.</p>
      <a href="https://script.google.com/macros/s/AKfycbyHwPN_qNbrSuxgUOBdFztE1B94UrUKg4SvybRvFKJBp_9RFWcbefbTczWF4-cXP2c/exec" target="_blank" rel="noopener noreferrer">
        Buka Dashboard
      </a>
    </div>
  </div>

  <script>
    (function () {
      const frame = document.getElementById('app-frame');
      const loading = document.getElementById('loading-screen');
      const fallback = document.getElementById('fallback');
      let loaded = false;

      frame.addEventListener('load', function () {
        loaded = true;
        setTimeout(function () {
          loading.classList.add('hidden');
        }, 300);
      });

      setTimeout(function () {
        if (!loaded) {
          loading.classList.add('hidden');
          fallback.classList.add('show');
        }
      }, 15000);
    })();
  </script>
</body>
</html>
